<style>
        body {
            background-color: #000000;
            color: #e0e3e1;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .amoled-bg {
            background-color: #000000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="amoled-bg selection:bg-primary/30">
<main class="flex flex-col min-h-screen px-phone_margin max-w-md mx-auto relative overflow-hidden">
<!-- Top Safe Area Padding -->
<div class="h-12 w-full"></div>
<div class="flex-1 flex flex-col items-center justify-center text-center">
<!-- Branding Icon Section -->
<div class="relative flex items-center justify-center">
<!-- Surface Container Circle #0A0A0A -->
<div class="w-[160px] h-[160px] rounded-full bg-[#0A0A0A] flex items-center justify-center animate-pulse duration-[4000ms]">
<span class="material-symbols-rounded text-primary" data-icon="movie_filter" style="font-size: 96px;">
                        movie_filter
                    </span>
</div>
</div>
<!-- Gap 32dp -->
<div class="h-8 w-full"></div>
<!-- Headline: displaySmall (36px in M3), weight 500 -->
<h1 class="text-on-surface font-title-lg text-display-sm font-medium max-w-[280px]">
                Split big videos. Merge them back.
            </h1>
<!-- Gap 12dp -->
<div class="h-3 w-full"></div>
<!-- Sub-headline: bodyLarge -->
<p class="text-on-surface-variant font-body-lg text-body-lg whitespace-nowrap">
                Lossless. Subtitles preserved. 4K untouched.
            </p>
<!-- Flexible Spacer -->
<div class="flex-grow"></div>
<!-- Configuration Card -->
<div class="w-full p-4 border border-outline-variant rounded-2xl flex items-start gap-4 text-left transition-all hover:bg-surface-container-low active:scale-[0.98]">
<span class="material-symbols-rounded text-on-surface-variant shrink-0" data-icon="folder_open" style="font-size: 24px;">
                    folder_open
                </span>
<div class="flex flex-col gap-1">
<h3 class="text-on-surface font-title-lg text-title-medium">
                        Pick a folder for your splits
                    </h3>
<p class="text-on-surface-variant font-body-md text-body-small">
                        We'll save parts here. You can change this later in Settings.
                    </p>
</div>
</div>
<!-- Gap 24dp -->
<div class="h-6 w-full"></div>
<!-- Primary Action Button -->
<button class="w-full h-14 bg-primary text-on-primary rounded-full flex items-center justify-center gap-2 font-title-lg text-title-medium shadow-lg hover:brightness-110 active:scale-95 transition-all">
<span class="material-symbols-rounded" data-icon="folder_open" style="font-size: 18px;">
                    folder_open
                </span>
                Pick output folder
            </button>
<!-- Gap 12dp -->
<div class="h-3 w-full"></div>
<!-- Secondary Text Button -->
<button class="text-primary font-title-lg text-title-medium py-3 px-8 rounded-full hover:bg-primary/10 active:scale-95 transition-all">
                Skip for now
            </button>
<!-- Bottom Safe Area Padding 24dp -->
<div class="h-6 w-full"></div>
</div>
</main>
<!-- Interactive Layer for subtle parallax/micro-interactions -->
<script>
        document.addEventListener('mousemove', (e) => {
            const circle = document.querySelector('.bg-\\[\\#0A0A0A\\]');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            circle.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Simulating the feeling of a native app interaction
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.opacity = '0.7';
            });
            btn.addEventListener('touchend', () => {
                btn.style.opacity = '1';
            });
        });
    </script>
</body></html>
