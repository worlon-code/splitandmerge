<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg overflow-hidden">
<!-- TOP APP BAR -->
<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16">
<div class="flex items-center gap-4">

<!-- SIDE NAVIGATION (Desktop Only) -->

<div class="px-6 mb-4">

</div>
<nav class="flex flex-col gap-1">

<span class="hidden md:inline font-body-lg text-body-lg">Merge</span>
</a>

<span class="hidden md:inline font-body-lg text-body-lg">Queue</span>

<!-- MAIN CONTENT AREA -->

<!-- Analysis State Container -->
<div class="w-full max-w-lg flex flex-col items-center text-center space-y-8">
<!-- Circular Progress Indicator -->
<div class="relative flex items-center justify-center w-32 h-32">
<svg class="animate-spin-slow w-full h-full" viewbox="0 0 100 100">
<circle class="text-outline-variant" cx="50" cy="50" fill="transparent" r="40" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-primary" cx="50" cy="50" fill="transparent" r="40" stroke="currentColor" stroke-dasharray="251.2" stroke-dashoffset="180" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="absolute flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
</div>
<!-- Copy and Detailed Status -->
<div class="space-y-2">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Analyzing files…</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Reading tracks · 12 of 40</p>
</div>
<!-- Linear Progress Container -->
<div class="w-full space-y-4">
<div class="w-full h-2 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full progress-bar-glow transition-all duration-500 ease-out" style="width: 30%"></div>
</div>
<!-- Current File Label (JetBrains Mono) -->
<div class="bg-surface-container rounded-xl p-4 border border-outline-variant w-full overflow-hidden">
<p class="font-label-md text-label-md text-primary truncate whitespace-nowrap">
            Perfect Crown S01E02 [MkvDrama].mkv
          </p>
</div>
</div>
<!-- Action Button -->
<div class="pt-8">
<button class="border border-outline-variant text-primary font-body-lg text-body-lg rounded-full px-12 py-3 hover:bg-surface-container-high transition-colors active:scale-95 duration-100 ease-in-out">
          Cancel

<!-- BACKGROUND DECORATION -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-20">
<div class="absolute top-1/4 -right-20 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -left-20 w-96 h-96 bg-secondary/10 rounded-full blur-[120px]"></div>
</div>
<script>
    // Micro-interaction for simulated progress
    let progress = 30;
    const progressBar = document.querySelector('.progress-bar-glow');
    const progressText = document.querySelector('.text-on-surface-variant');
    const fileLabel = document.querySelector('.truncate');
    
    const files = [
      "Perfect Crown S01E02 [MkvDrama].mkv",
      "Perfect Crown S01E03 [MkvDrama].mkv",
      "The_Grand_Algorithm_v2_final.mp4",
      "System_Architecture_Overview.ts",
      "Log_Analysis_Report_2023.txt"
    ];

    setInterval(() => {
      if (progress < 95) {
        progress += Math.random() * 0.5;
        progressBar.style.width = `${progress}%`;
        
        // Randomly flip file names to simulate activity
        if (Math.random() > 0.98) {
          const randomFile = files[Math.floor(Math.random() * files.length)];
          fileLabel.textContent = randomFile;
        }
      }
    }, 200);
  </script>
