<style>
        body {
            background-color: #000000;
            color: #e6e1e4;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom Circular Progress Animation */
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes dash {
            0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
            100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
        }
        .animate-circular {
            animation: rotate 2s linear infinite;
        }
        .animate-circular circle {
            stroke-dasharray: 1, 150;
            stroke-dashoffset: 0;
            stroke-linecap: round;
            animation: dash 1.5s ease-in-out infinite;
        }
    </style>

<span class="hidden md:inline font-body-lg text-body-lg">Merge</span>

<div class="text-on-surface-variant dark:text-on-surface-variant mx-3 my-1 px-4 py-3 flex items-center gap-3 hover:bg-surface-container-high dark:hover:bg-surface-container-high rounded-full transition-all duration-200 cursor-pointer">

</div>

<!-- Top App Bar -->

<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high rounded-full p-2 transition-colors active:opacity-80">arrow_back</button>

</div>
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high rounded-full p-2 transition-colors active:opacity-80">more_vert</button>
</header>
<!-- Main Content Canvas -->
<main class="min-h-screen pt-24 pb-32 px-margin-mobile md:px-margin-desktop md:ml-72 flex flex-col items-center justify-center text-center">
<!-- Scanning Animation Area -->
<div class="relative w-48 h-48 mb-12 flex items-center justify-center">
<!-- Background Atmosheric Glow -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-3xl animate-pulse"></div>
<!-- Circular Progress Indicator -->
<svg class="animate-circular w-32 h-32 text-primary" viewbox="25 25 50 50">
<circle class="stroke-current" cx="50" cy="50" fill="none" r="20" stroke-miterlimit="10" stroke-width="4"></circle>
</svg>
</div>
<!-- Textual Feedback -->
<div class="max-w-md space-y-3">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Analyzing files…</h2>

</div>

<div class="w-full max-w-sm mt-10">

<!-- Micro-interaction for Progress Simulation -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.querySelector('.bg-primary');
            const trackCounter = document.querySelector('.text-on-surface-variant');
            let progress = 30;
            let currentTrack = 12;

            const interval = setInterval(() => {
                if (progress < 95) {
                    progress += Math.random() * 2;
                    progressBar.style.width = `${progress}%`;
                    
                    if (progress > (currentTrack / 40) * 100) {
                        currentTrack++;
                        trackCounter.innerText = `Reading tracks · ${currentTrack} of 40`;
                    }
                } else {
                    clearInterval(interval);
                }
            }, 800);
        });
    </script>
